name: build installer

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: windows exe (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: x86
            target: i686-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-${{ matrix.arch }}
      - name: build
        shell: pwsh
        run: .\scripts\build-msi.ps1 -Arch ${{ matrix.arch }}
      - name: upload windows build
        uses: actions/upload-artifact@v4
        with:
          name: PhaseAnimatorInstaller-windows-${{ matrix.arch }}
          path: dist/windows/${{ matrix.arch }}/

  macos:
    name: macos app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cache cargo
        uses: Swatinem/rust-cache@v2
      - name: build
        run: bash ./scripts/build-macos.sh
      - name: upload macos build
        uses: actions/upload-artifact@v4
        with:
          name: PhaseAnimatorInstaller-macos
          path: dist/macos/
