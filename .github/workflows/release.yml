name: release build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: windows package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        shell: pwsh
        run: .\scripts\build-msi.ps1
      - name: zip
        shell: pwsh
        run: Compress-Archive -Path "dist/windows/*" -DestinationPath "PhaseAnimatorInstaller-windows.zip" -Force
      - name: upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            PhaseAnimatorInstaller-windows.zip
            dist/windows/*.msi
            dist/windows/*Setup.exe

  macos:
    name: macos package
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: bash ./scripts/build-macos.sh
      - name: zip
        shell: pwsh
        run: Compress-Archive -Path "dist/macos/*" -DestinationPath "PhaseAnimatorInstaller-macos.zip" -Force
      - name: upload macos artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: PhaseAnimatorInstaller-macos.zip

  release:
    name: github release
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: publish
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.msi
            artifacts/**/*Setup.exe
